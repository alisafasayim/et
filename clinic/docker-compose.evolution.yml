# Evolution API — WhatsApp self-host (Docker compose)
#
# KVKK güvencesi:
# - Tüm hasta WhatsApp mesajları sizin Docker container'ınızdan geçer
# - 3. partiye (Twilio, Meta) sadece WhatsApp protokol katmanında transit
# - Mesaj içeriği yerel disk'te şifresiz tutulur (volume bind)
#   → KVKK m.6 için disk şifrelemesi şart (LUKS/BitLocker veya systemd-cryptsetup)
#
# Kullanım:
#   docker compose -f docker-compose.evolution.yml up -d
#   # QR taratma:
#   open http://localhost:8080/manager
#   # → Login: ${AUTHENTICATION_API_KEY}
#   # → Instance: clinic → QR Code → telefondan WhatsApp web bağla

services:
  evolution:
    image: atendai/evolution-api:latest
    container_name: clinic-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Auth — generate_secrets.py ile üretilen WEBHOOK_SECRET kullanılabilir
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:?EVOLUTION_API_KEY required}
      - SERVER_URL=${WEBHOOK_PUBLIC_URL:-http://localhost:8080}

      # Bellek modu (DB yok, hızlı başlangıç). Üretimde Postgres öner.
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false

      # Webhook — clinic'in /webhook/whatsapp endpoint'ine bağlanır.
      #
      # NOT: Container içinden "localhost" KENDİNİ gösterir, clinic'i değil!
      # Bu yüzden EVOLUTION_WEBHOOK_TARGET_URL kullanıyoruz:
      #   - Dev (Docker Desktop, Win/Mac): http://host.docker.internal:5055
      #     (Docker Desktop bu DNS'i otomatik sağlar)
      #   - Prod (public URL): https://klinik.example.com
      #
      # Set edilmemişse: Docker Desktop varsayılanı kullanılır.
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_TARGET_URL:-http://host.docker.internal:5055}/webhook/whatsapp
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true

    # Linux'ta host.docker.internal otomatik gelmez; tüm platformlar için ekle
    extra_hosts:
      - "host.docker.internal:host-gateway"

      # KVKK için: log seviyesi düşük (PII içerebilir)
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false

      # Türkiye saat dilimi
      - TZ=Europe/Istanbul

      # WhatsApp Web sürümü (dolar işareti escape: $$ = $)
      - CONFIG_SESSION_PHONE_CLIENT=Klinik
      - CONFIG_SESSION_PHONE_NAME=Chrome

      # WhatsApp web yeniden bağlanma (instance koparsa otomatik QR)
      - QRCODE_LIMIT=30

    volumes:
      # Instance verisi (auth state, vs.) — KVKK için disk şifreleme şart
      - ./evolution_data:/evolution/instances
      - ./evolution_data/logs:/evolution/logs

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# Veri kalıcılığı için named volume yerine bind mount kullanıyoruz
# çünkü KVKK için disk şifrelemesini siz yönetiyorsunuz (./evolution_data/).
